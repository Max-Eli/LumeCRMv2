# Backend deploy — build, push to ECR, run migrations, update ECS service.
#
# Triggered by a push to `main` that touches `backend/**`, OR manually
# via `workflow_dispatch`. Runs migrations BEFORE swapping the running
# task definition so a backwards-incompatible schema change can't take
# the service down by exposing old code to a new schema.
#
# Authentication: OIDC, NOT long-lived access keys. The role this
# workflow assumes is provisioned manually (see runbook); its trust
# policy restricts to this exact repo + main branch.

name: Backend deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA). Use this to redeploy a previous build for rollback."
        required: false
        default: ""

# Don't run two deploys at once — ECS handles deployment overlap, but
# the migration step ahead of it could race and leave the schema
# half-applied. One in-flight at a time.
concurrency:
  group: backend-deploy
  cancel-in-progress: false

permissions:
  id-token: write # OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: lume-prod-backend
  ECS_CLUSTER: lume-prod-cluster
  ECS_SERVICE: lume-prod-backend
  TASK_DEF_FAMILY: lume-prod-backend
  CONTAINER_NAME: backend

jobs:
  deploy:
    # Native arm64 runner — same arch as Fargate Graviton, so the image
    # build is native (no QEMU). ~3× faster than emulating arm64 on x86.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # No QEMU — native arm64 runner builds linux/arm64 directly.

      - name: Build + push image (linux/arm64 for Fargate Graviton)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}
          # GitHub Actions cache — reuses pip + Django + Python deps
          # layers across runs when requirements.txt / source haven't
          # changed. First build is normal; subsequent ones drop sharply.
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Record image URI
        run: |
          echo "image_uri=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}" >> "$GITHUB_ENV"

      - name: Render new task definition
        id: render
        run: |
          # Pull the running task def, swap the image, re-register.
          aws ecs describe-task-definition \
            --task-definition "${{ env.TASK_DEF_FAMILY }}" \
            --query taskDefinition > task-def.json

          # Strip read-only fields ECS rejects on register.
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-def.json > task-def-clean.json

          # Replace the container image.
          jq --arg img "${{ env.image_uri }}" \
             --arg name "${{ env.CONTAINER_NAME }}" \
             '.containerDefinitions |= map(if .name == $name then .image = $img else . end)' \
             task-def-clean.json > task-def-new.json

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def-new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "new_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Run database migrations (one-shot task on new revision)
        # Run migrations BEFORE the service swap. If migrations fail,
        # we never deregister the old tasks — service stays healthy on
        # the previous code, deploy fails loudly, no half-state.
        #
        # IMPORTANT — do NOT pre-set DATABASE_URL in the container
        # command override. `settings/base.py` assembles DATABASE_URL
        # from DB_USER / DB_PASSWORD / DB_HOST / DB_PORT / DB_NAME with
        # `urllib.parse.quote(password, safe='')`, which is the only
        # safe path: RDS-generated passwords contain `$`, `!`, `@`, `:`
        # etc. that mangle a raw shell-built URL (the `:` ends up
        # parsed as the port → ValueError on `url.port` → deploy
        # fails before migrations run). An earlier revision of this
        # step did `export DATABASE_URL="postgres://$DB_USER:$DB_PASSWORD@..."`
        # in the shell command, which bypassed the safe assembly and
        # broke the deploy on 2026-05-26. Don't reintroduce it.
        run: |
          echo "Running migrations on ${{ steps.render.outputs.new_arn }}"
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "${{ steps.render.outputs.new_arn }}" \
            --launch-type FARGATE \
            --network-configuration '{
              "awsvpcConfiguration": {
                "subnets": ${{ secrets.PRIVATE_SUBNETS_JSON }},
                "securityGroups": ${{ secrets.BACKEND_SG_JSON }},
                "assignPublicIp": "DISABLED"
              }
            }' \
            --overrides '{
              "containerOverrides": [{
                "name": "${{ env.CONTAINER_NAME }}",
                "command": ["python", "manage.py", "migrate", "--noinput"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN"

          EXIT=$(aws ecs describe-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT" != "0" ]; then
            echo "Migration task exited $EXIT — failing the deploy."
            aws logs tail "/lume-crm/prod/backend" --since 5m || true
            exit 1
          fi

      - name: Update ECS service to new task def
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "${{ steps.render.outputs.new_arn }}" \
            --force-new-deployment > /dev/null

      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"
          echo "✓ Backend deploy stable on tag ${{ steps.tag.outputs.tag }}."
